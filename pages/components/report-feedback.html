<div
  id="feedbackOverlay"
  class="feedback-overlay"
  role="presentation"
  aria-hidden="true"
>
  <div
    id="feedbackDialog"
    class="feedback-dialog"
    role="alertdialog"
    aria-modal="true"
    aria-labelledby="feedbackTitle"
    aria-describedby="feedbackMessage"
  >
    <div id="feedbackIcon" class="feedback-icon" aria-hidden="true"></div>

    <h2 id="feedbackTitle"></h2>
    <p id="feedbackMessage"></p>

    <button id="feedbackConfirmBtn" class="btn-primary">OK</button>
  </div>
</div>
